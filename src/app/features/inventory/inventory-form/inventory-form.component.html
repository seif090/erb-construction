<div class="p-6 bg-white dark:bg-slate-900 rounded-3xl" dir="rtl">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50 dark:border-slate-800">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
        <lucide-icon [img]="Package" [size]="24"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-black text-slate-800 dark:text-white">
          {{ isEdit ? 'تعديل بيانات الصنف' : 'إضافة صنف جديد' }}
        </h2>
        <p class="text-xs text-slate-400 font-medium">تسجيل المواد، الكميات، وتكلفة الوحدة</p>
      </div>
    </div>
    <button (click)="close()" class="p-2 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Item Name -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">اسم الصنف / Item Name</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Package" [size]="18"></lucide-icon>
          </div>
          <input formControlName="name" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="اسم المادة أو المنتج...">
        </div>
      </div>

      <!-- Category -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">التصنيف / Category</label>
        <div class="relative group">
           <select formControlName="category" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="مواد بناء">مواد بناء</option>
            <option value="دهانات">دهانات</option>
            <option value="أخشاب">أخشاب</option>
            <option value="كهرباء">كهرباء</option>
            <option value="سباكة">سباكة</option>
            <option value="أدوات">أدوات / معدات</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- SKU / Code -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">كود المنتج / SKU</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Tag" [size]="18"></lucide-icon>
          </div>
          <input formControlName="sku" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="00-XXX-000">
        </div>
      </div>

      <!-- Unit -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">وحدة القياس / Unit</label>
        <div class="relative group">
           <select formControlName="unit" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="PIECE">قطعة / Piece</option>
            <option value="TON">طن / Ton</option>
            <option value="LITER">لتر / Liter</option>
            <option value="METER">متر / Meter</option>
            <option value="KG">كجم / KG</option>
            <option value="BOX">صندوق / Box</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Quantity -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الكمية الحالية / Quantity</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Move" [size]="18"></lucide-icon>
          </div>
          <input formControlName="quantity" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0">
        </div>
      </div>

      <!-- Min Quantity (Alert) -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الحد الأدنى للتنبيه / Min Stock</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Move" [size]="18"></lucide-icon>
          </div>
          <input formControlName="minQuantity" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="10">
        </div>
      </div>
    </div>

    <!-- Unit Cost -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">تكلفة الوحدة / Unit Cost</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
        </div>
        <input formControlName="unitCost" type="number" 
               class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
               placeholder="0.00">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Location -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">مكان التخزين / Location</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="MapPin" [size]="18"></lucide-icon>
          </div>
          <input formControlName="location" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="مخزن أ، رف 5...">
        </div>
      </div>

      <!-- Supplier -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">المورد الافتراضي / Supplier</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Tag" [size]="18"></lucide-icon>
          </div>
          <input formControlName="supplier" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="اسم المورد أو الشركة...">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="pt-6 flex items-center justify-end gap-3 border-t border-slate-50 dark:border-slate-800">
      <button type="button" (click)="close()" 
              class="px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        إلغاء
      </button>
      <button type="submit" 
              [disabled]="inventoryForm.invalid || isSubmitting()"
              class="px-8 py-2.5 rounded-2xl text-sm font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-primary/20 flex items-center gap-2 transition-all">
        <lucide-icon *ngIf="!isSubmitting()" [img]="Save" [size]="18"></lucide-icon>
        <span *ngIf="isSubmitting()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ isEdit ? 'تحديث الصنف' : 'حفظ في المخزن' }}
      </button>
    </div>
  </form>
</div>
