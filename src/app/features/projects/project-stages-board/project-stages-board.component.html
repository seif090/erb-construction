<div class="h-full flex flex-col gap-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-white">لوحة مراحل المشروع</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400" *ngIf="project()">{{ project()?.name }}</p>
    </div>
    <a routerLink="/projects" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:text-primary-light">
      <lucide-icon [img]="ArrowRight" [size]="16"></lucide-icon>
      الرجوع للمشاريع
    </a>
  </div>

  <div *ngIf="isLoading()" class="flex items-center justify-center py-24">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary"></div>
  </div>

  <ng-container *ngIf="!isLoading()">
    <div class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-4">
      <div class="flex items-center gap-2 mb-3">
        <lucide-icon [img]="Plus" [size]="14"></lucide-icon>
        <p class="text-sm font-bold">إضافة مرحلة جديدة</p>
      </div>
      <form [formGroup]="stageForm" class="grid grid-cols-1 md:grid-cols-4 gap-3" (ngSubmit)="addStage()">
        <input formControlName="name" type="text" class="md:col-span-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 py-2 text-sm" placeholder="اسم المرحلة">
        <input formControlName="order" type="number" min="1" class="rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 py-2 text-sm" placeholder="الترتيب">
        <button type="submit" [disabled]="isSubmittingStage()" class="rounded-xl bg-primary text-white text-sm font-bold px-3 py-2 hover:bg-primary-light disabled:opacity-60">
          {{ isSubmittingStage() ? 'جاري الإضافة...' : 'إضافة' }}
        </button>
      </form>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div *ngFor="let stage of stages()" class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-4">
        <div class="flex items-center justify-between mb-3">
          <div>
            <p class="font-bold text-slate-800 dark:text-white">{{ stage.order }}. {{ stage.name }}</p>
            <p class="text-xs text-slate-400">{{ stage.progress }}%</p>
          </div>
          <button type="button" (click)="toggleCompletion(stage)" class="inline-flex items-center gap-1 px-2 py-1 rounded-lg text-xs" [class.bg-green-100]="stage.isCompleted" [class.text-green-700]="stage.isCompleted" [class.bg-slate-100]="!stage.isCompleted" [class.text-slate-600]="!stage.isCompleted">
            <lucide-icon [img]="CheckCircle2" [size]="14"></lucide-icon>
            {{ stage.isCompleted ? 'مكتملة' : 'غير مكتملة' }}
          </button>
        </div>

        <div class="space-y-2">
          <input type="range" min="0" max="100" [value]="stage.progress" (change)="updateProgress(stage, $any($event.target).value)" class="w-full">
          <div class="flex items-center gap-2">
            <input type="number" min="0" max="100" [value]="stage.progress" (change)="updateProgress(stage, $any($event.target).value)" class="w-24 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-2 py-1 text-sm">
            <span class="text-xs text-slate-500">تحديث مباشر للنسبة</span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="stages().length === 0" class="rounded-2xl border border-dashed border-slate-300 dark:border-slate-700 p-8 text-center text-slate-400">
      <lucide-icon [img]="ListTodo" [size]="28" class="mx-auto mb-2"></lucide-icon>
      لا توجد مراحل للمشروع حتى الآن.
    </div>
  </ng-container>
</div>
