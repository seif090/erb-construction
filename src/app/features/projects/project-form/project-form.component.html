<div class="p-6 bg-white dark:bg-slate-900 rounded-3xl" dir="rtl">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50 dark:border-slate-800">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
        <lucide-icon [img]="Folder" [size]="24"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-black text-slate-800 dark:text-white">
          {{ isEdit ? 'تعديل بيانات المشروع' : 'فتح مشروع جديد' }}
        </h2>
        <p class="text-xs text-slate-400 font-medium">إدخال تفاصيل المشروع والميزانية والموقع</p>
      </div>
    </div>
    <button (click)="close()" class="p-2 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Project Name -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">اسم المشروع / Project Name</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Folder" [size]="18"></lucide-icon>
          </div>
          <input formControlName="name" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="اسم المشروع...">
        </div>
      </div>

      <!-- Client Selection -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">العميل / Client</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="User" [size]="18"></lucide-icon>
          </div>
          <select formControlName="clientId" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 pl-10 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="" disabled selected>اختر عميل من القائمة...</option>
            <option *ngFor="let client of clients()" [value]="client.id">{{ client.name }}</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">حالة المشروع / Status</label>
        <div class="relative group">
          <select formControlName="status" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="PENDING">قيد الانتظار / Pending</option>
            <option value="IN_PROGRESS">قيد التنفيذ / In Progress</option>
            <option value="ON_HOLD">متوقف مؤقتاً / On Hold</option>
            <option value="COMPLETED">مكتمل / Completed</option>
            <option value="CANCELLED">ملغي / Cancelled</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Location -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الموقع / Location</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="MapPin" [size]="18"></lucide-icon>
          </div>
          <input formControlName="location" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="العنوان أو الإحداثيات...">
        </div>
      </div>

      <!-- Budget -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الميزانية الإجمالية / Budget</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
          </div>
          <input formControlName="budget" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0.00">
        </div>
      </div>

      <!-- Spent -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">المبلغ المصروف حتى الآن / Spent</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
          </div>
          <input formControlName="spent" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0.00">
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Start Date -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">تاريخ البدء / Start Date</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Calendar" [size]="18"></lucide-icon>
          </div>
          <input formControlName="startDate" type="date" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner">
        </div>
      </div>

      <!-- End Date -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">تاريخ الانتهاء المتوقع / End Date</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Calendar" [size]="18"></lucide-icon>
          </div>
          <input formControlName="endDate" type="date" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner">
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">وصف المشروع / Description</label>
      <div class="relative group">
        <div class="absolute top-3 right-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="ClipboardList" [size]="18"></lucide-icon>
        </div>
        <textarea formControlName="description" rows="3"
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                  placeholder="ملاحظات إضافية حول المشروع..."></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="pt-6 flex items-center justify-end gap-3 border-t border-slate-50 dark:border-slate-800">
      <button type="button" (click)="close()" 
              class="px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        إلغاء
      </button>
      <button type="submit" 
              [disabled]="projectForm.invalid || isSubmitting()"
              class="px-8 py-2.5 rounded-2xl text-sm font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-primary/20 flex items-center gap-2 transition-all">
        <lucide-icon *ngIf="!isSubmitting()" [img]="Save" [size]="18"></lucide-icon>
        <span *ngIf="isSubmitting()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ isEdit ? 'تحديث المشروع' : 'فتح المشروع' }}
      </button>
    </div>
  </form>
</div>
