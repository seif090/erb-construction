<div class="p-6 bg-white dark:bg-slate-900 rounded-3xl" dir="rtl">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50 dark:border-slate-800">
    <div class="flex items-center gap-4">
      <div [class]="'h-12 w-12 rounded-2xl flex items-center justify-center ' + (transactionForm.get('type')?.value === 'INCOME' ? 'bg-success/10 text-success' : 'bg-error/10 text-error')">
        <lucide-icon [img]="DollarSign" [size]="24"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-black text-slate-800 dark:text-white">
          {{ isEdit ? 'تعديل حركة مالية' : 'تسجيل حركة مالية' }}
        </h2>
        <p class="text-xs text-slate-400 font-medium">إدخال بيانات الإيرادات والمصروفات والتصنيفات</p>
      </div>
    </div>
    <button (click)="close()" class="p-2 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <!-- Type Selection (Large Buttons look) -->
    <div class="grid grid-cols-2 gap-4">
       <button type="button" 
               (click)="transactionForm.get('type')?.setValue('INCOME')"
               [class]="'py-4 rounded-2xl border-2 flex flex-col items-center gap-2 transition-all ' + (transactionForm.get('type')?.value === 'INCOME' ? 'border-success bg-success/5 text-success shadow-lg' : 'border-slate-100 dark:border-slate-800 text-slate-400 hover:border-slate-200')">
          <lucide-icon [img]="Save" [size]="24" class="rotate-180"></lucide-icon>
          <span class="text-sm font-bold">إيراد / Income</span>
       </button>
       <button type="button" 
               (click)="transactionForm.get('type')?.setValue('EXPENSE')"
               [class]="'py-4 rounded-2xl border-2 flex flex-col items-center gap-2 transition-all ' + (transactionForm.get('type')?.value === 'EXPENSE' ? 'border-error bg-error/5 text-error shadow-lg' : 'border-slate-100 dark:border-slate-800 text-slate-400 hover:border-slate-200')">
          <lucide-icon [img]="Save" [size]="24"></lucide-icon>
          <span class="text-sm font-bold">مصروف / Expense</span>
       </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Amount -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">المبلغ / Amount</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
          </div>
          <input formControlName="amount" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0.00">
        </div>
      </div>

      <!-- Category -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الفئة / Category</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Tag" [size]="18"></lucide-icon>
          </div>
          <select formControlName="category" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="Sales">إيراد مبيعات / Sales</option>
            <option value="Materials">شراء مواد / Materials</option>
            <option value="Labor">أجور عمال / Labor</option>
            <option value="Marketing">تسويق / Marketing</option>
            <option value="Rent">إيجارات / Rent</option>
            <option value="Other">أخرى / Other</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">البيان / Description</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="FileText" [size]="18"></lucide-icon>
        </div>
        <input formControlName="description" type="text" 
               class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
               placeholder="وصف مختصر للحركة المالي...">
      </div>
    </div>

    <!-- Project Association -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">مشروع مرتبط / Project (Optional)</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="Folder" [size]="18"></lucide-icon>
        </div>
        <select formControlName="projectId" 
                class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
          <option value="">حركة عامة (بدون مشروع)</option>
          <option *ngFor="let p of projects()" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
       <!-- Date -->
       <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">التاريخ / Date</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Calendar" [size]="18"></lucide-icon>
          </div>
          <input formControlName="date" type="date" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner">
        </div>
      </div>

      <!-- Reference -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">رقم المرجع / Reference</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Tag" [size]="18"></lucide-icon>
          </div>
          <input formControlName="reference" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="رقم الفاتورة أو الشيك...">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="pt-6 flex items-center justify-end gap-3 border-t border-slate-50 dark:border-slate-800">
      <button type="button" (click)="close()" 
              class="px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        إلغاء
      </button>
      <button type="submit" 
              [disabled]="transactionForm.invalid || isSubmitting()"
              class="px-8 py-2.5 rounded-2xl text-sm font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-primary/20 flex items-center gap-2 transition-all">
        <lucide-icon *ngIf="!isSubmitting()" [img]="Save" [size]="18"></lucide-icon>
        <span *ngIf="isSubmitting()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ isEdit ? 'تحديث البيانات' : 'تسجيل الحركة' }}
      </button>
    </div>
  </form>
</div>
