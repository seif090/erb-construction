<div class="p-6 bg-white dark:bg-slate-900 rounded-3xl" dir="rtl">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50 dark:border-slate-800">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
        <lucide-icon [img]="User" [size]="24"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-black text-slate-800 dark:text-white">
          {{ isEdit ? 'تعديل بيانات العميل' : 'إضافة عميل جديد' }}
        </h2>
        <p class="text-xs text-slate-400 font-medium">إكمال بيانات العميل لبدء المتابعة</p>
      </div>
    </div>
    <button (click)="close()" class="p-2 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Name -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">اسم العميل / Name</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="User" [size]="18"></lucide-icon>
          </div>
          <input formControlName="name" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="الاسم الكامل...">
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">البريد الإلكتروني / Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Mail" [size]="18"></lucide-icon>
          </div>
          <input formControlName="email" type="email" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="example@mail.com">
        </div>
      </div>

      <!-- Phone -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">رقم الجوال / Phone</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Phone" [size]="18"></lucide-icon>
          </div>
          <input formControlName="phone" type="text" dir="ltr"
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner text-right"
                 placeholder="+20 123 456 7890">
        </div>
      </div>

      <!-- Pipeline -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">مرحلة العميل / Pipeline</label>
        <div class="relative group">
          <select formControlName="pipeline" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="LEAD">عميل محتمل / Lead</option>
            <option value="NEGOTIATION">تفاوض / Negotiation</option>
            <option value="PROPOSAL">عرض سعر / Proposal</option>
            <option value="CLOSED">مكتمل / Closed</option>
            <option value="LOST">مفقود / Lost</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Address -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">العنوان / Address</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="MapPin" [size]="18"></lucide-icon>
        </div>
        <input formControlName="address" type="text" 
               class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
               placeholder="المدينة، الحي...">
      </div>
    </div>

    <!-- Total Value -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">قيمة العقد المتوقعة / Expected Value</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
        </div>
        <input formControlName="totalValue" type="number" 
               class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
               placeholder="0.00">
      </div>
    </div>

    <div class="pt-2 border-t border-slate-100 dark:border-slate-800" *ngIf="isEdit">
      <div class="flex items-center gap-2 mb-3">
        <lucide-icon [img]="Paperclip" [size]="16" class="text-primary"></lucide-icon>
        <h3 class="text-sm font-bold text-slate-700 dark:text-slate-200">مرفقات العميل / Attachments</h3>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3" [formGroup]="attachmentForm">
        <input formControlName="name" type="text" class="block w-full text-sm rounded-xl border-0 py-2.5 px-3 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary" placeholder="اسم الملف">
        <input formControlName="url" type="url" class="block w-full text-sm rounded-xl border-0 py-2.5 px-3 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary" placeholder="https://...">
      </div>

      <div class="mb-3 grid grid-cols-1 md:grid-cols-2 gap-3">
        <input type="file" (change)="onAttachmentFileSelected($event)" class="block w-full text-xs rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-2">
        <button type="button" (click)="uploadAttachmentFile()" [disabled]="!selectedAttachmentFile() || isUploadingAttachment()" class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-xs font-bold text-white bg-emerald-600 hover:bg-emerald-500 disabled:opacity-60">
          <span *ngIf="!isUploadingAttachment()">رفع ملف فعلي</span>
          <span *ngIf="isUploadingAttachment()">جاري الرفع...</span>
        </button>
      </div>

      <button type="button" (click)="addAttachment()" [disabled]="isUploadingAttachment()" class="mb-4 inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-60">
        <lucide-icon [img]="Plus" [size]="14"></lucide-icon>
        <span *ngIf="!isUploadingAttachment()">إضافة مرفق</span>
        <span *ngIf="isUploadingAttachment()">جاري الإضافة...</span>
      </button>

      <div class="space-y-2" *ngIf="attachments().length > 0; else noAttachments">
        <div *ngFor="let item of attachments()" class="flex items-center justify-between gap-2 rounded-xl border border-slate-200 dark:border-slate-700 px-3 py-2">
          <a [href]="item.url" target="_blank" class="inline-flex items-center gap-2 text-xs font-medium text-primary hover:underline">
            <lucide-icon [img]="Link2" [size]="14"></lucide-icon>
            {{ item.name }}
          </a>
          <div class="flex items-center gap-1">
            <button type="button" (click)="openPreview(item)" class="p-1.5 rounded-lg text-sky-600 hover:bg-sky-50 dark:hover:bg-sky-900/20">
              <lucide-icon [img]="Eye" [size]="14"></lucide-icon>
            </button>
            <button type="button" (click)="removeAttachment(item.id)" class="p-1.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">
              <lucide-icon [img]="Trash2" [size]="14"></lucide-icon>
            </button>
          </div>
        </div>
      </div>

      <ng-template #noAttachments>
        <p class="text-xs text-slate-400">لا توجد مرفقات بعد.</p>
      </ng-template>

      <div *ngIf="previewAttachment() as preview" class="mt-4 rounded-xl border border-slate-200 dark:border-slate-700 p-3 bg-slate-50/60 dark:bg-slate-800/30">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-bold text-slate-600 dark:text-slate-300">معاينة: {{ preview.name }}</p>
          <button type="button" (click)="clearPreview()" class="text-xs text-slate-500 hover:text-slate-800 dark:hover:text-slate-200">إغلاق</button>
        </div>

        <img *ngIf="isImageAttachment(preview)" [src]="preview.url" alt="Attachment preview" class="max-h-64 rounded-lg border border-slate-200 dark:border-slate-700">

        <iframe *ngIf="isPdfAttachment(preview)" [src]="preview.url" class="w-full h-72 rounded-lg border border-slate-200 dark:border-slate-700"></iframe>

        <div *ngIf="!isImageAttachment(preview) && !isPdfAttachment(preview)" class="text-xs text-slate-500">
          هذا النوع لا يدعم المعاينة المباشرة.
          <a [href]="preview.url" target="_blank" class="text-primary underline mr-1">فتح الملف</a>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="pt-6 flex items-center justify-end gap-3 border-t border-slate-50 dark:border-slate-800">
      <button type="button" (click)="close()" 
              class="px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        إلغاء
      </button>
      <button type="submit" 
              [disabled]="clientForm.invalid || isSubmitting()"
              class="px-8 py-2.5 rounded-2xl text-sm font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-primary/20 flex items-center gap-2 transition-all">
        <lucide-icon *ngIf="!isSubmitting()" [img]="Save" [size]="18"></lucide-icon>
        <span *ngIf="isSubmitting()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ isEdit ? 'تحديث البيانات' : 'حفظ العميل' }}
      </button>
    </div>
  </form>
</div>
