<div class="p-6 bg-white dark:bg-slate-900 rounded-3xl" dir="rtl">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50 dark:border-slate-800">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
        <lucide-icon [img]="Building" [size]="24"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-black text-slate-800 dark:text-white">
          {{ isEdit ? 'تعديل بيانات الوحدة' : 'إضافة وحدة عقارية' }}
        </h2>
        <p class="text-xs text-slate-400 font-medium">تسجيل تفاصيل الوحدة، السعر، والمواصفات</p>
      </div>
    </div>
    <button (click)="close()" class="p-2 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="unitForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Unit Name/Title -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">اسم الوحدة / Unit Name</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Home" [size]="18"></lucide-icon>
          </div>
          <input formControlName="name" type="text" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="مثلاً: شقة رقم 101 - برج الياسمين">
        </div>
      </div>

      <!-- Project Selection -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">المشروع التابع / Project</label>
        <div class="relative group">
          <select formControlName="projectId" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="">وحدة مستقلة (بدون مشروع)</option>
            <option *ngFor="let project of projects()" [value]="project.id">{{ project.name }}</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Type -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">نوع العقار / Type</label>
        <div class="relative group">
          <select formControlName="type" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="APARTMENT">شقة / Apartment</option>
            <option value="VILLA">فيلا / Villa</option>
            <option value="STUDIO">استوديو / Studio</option>
            <option value="OFFICE">مكتب / Office</option>
            <option value="LAND">أرض / Land</option>
            <option value="OTHER">أخرى / Other</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الحالة / Status</label>
        <div class="relative group">
          <select formControlName="status" 
                  class="block w-full text-sm rounded-2xl border-0 py-3 pr-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner appearance-none">
            <option value="AVAILABLE">متاح / Available</option>
            <option value="RESERVED">محجوز / Reserved</option>
            <option value="SOLD">مباع / Sold</option>
            <option value="RENTED">مؤجر / Rented</option>
            <option value="MAINTENANCE">صيانة / Maintenance</option>
          </select>
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
             <lucide-icon [img]="X" [size]="14" class="rotate-45"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Price -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">السعر / Price</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="DollarSign" [size]="18"></lucide-icon>
          </div>
          <input formControlName="price" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0.00">
        </div>
      </div>

      <!-- Area -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">المساحة (م²) / Area (m²)</label>
        <div class="relative group">
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [img]="Move" [size]="18"></lucide-icon>
          </div>
          <input formControlName="area" type="number" 
                 class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
                 placeholder="0">
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Rooms -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">عدد الغرف / Rooms</label>
        <input formControlName="rooms" type="number" 
               class="block w-full text-sm rounded-2xl border-0 py-3 px-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner">
      </div>

      <!-- Baths -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">دورات المياه / Baths</label>
        <input formControlName="baths" type="number" 
               class="block w-full text-sm rounded-2xl border-0 py-3 px-4 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner">
      </div>
    </div>

    <!-- Location -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-2">الموقع التفصيلي / Detailed Location</label>
      <div class="relative group">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [img]="MapPin" [size]="18"></lucide-icon>
        </div>
        <input formControlName="location" type="text" 
               class="block w-full text-sm rounded-2xl border-0 py-3 pr-11 bg-slate-50 dark:bg-slate-800/50 ring-1 ring-inset ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary transition-all shadow-inner"
               placeholder="المدينة، الحي، المبنى...">
      </div>
    </div>

    <!-- Actions -->
    <div class="pt-6 flex items-center justify-end gap-3 border-t border-slate-50 dark:border-slate-800">
      <button type="button" (click)="close()" 
              class="px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        إلغاء
      </button>
      <button type="submit" 
              [disabled]="unitForm.invalid || isSubmitting()"
              class="px-8 py-2.5 rounded-2xl text-sm font-bold text-white bg-primary hover:bg-primary-light disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-primary/20 flex items-center gap-2 transition-all">
        <lucide-icon *ngIf="!isSubmitting()" [img]="Save" [size]="18"></lucide-icon>
        <span *ngIf="isSubmitting()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        {{ isEdit ? 'تحديث الوحدة' : 'حفظ الوحدة' }}
      </button>
    </div>
  </form>
</div>
