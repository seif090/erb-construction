<div class="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] dark:bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] relative overflow-hidden transition-colors duration-200">
  
  <!-- Blurred Background Decorations -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-40 animate-blob"></div>
  <div class="absolute top-40 -right-40 w-96 h-96 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-40 animate-blob animation-delay-2000"></div>
  <div class="absolute -bottom-40 left-20 w-72 h-72 bg-electric-violet rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-40 animate-blob animation-delay-4000"></div>

  <div class="relative sm:mx-auto sm:w-full sm:max-w-md z-10">
    <h2 class="mt-6 text-center text-4xl font-extrabold text-primary-dark dark:text-white tracking-tight">
      <span class="text-secondary">Erb</span> <span class="font-light">ERP System</span>
    </h2>
    <p class="mt-2 text-center text-sm text-slate-600 dark:text-slate-400">
      تسجيل الدخول للنظام / System Login
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border border-white/20 dark:border-slate-700">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Error Message Alert -->
        <div *ngIf="errorMessage" class="bg-error/10 border border-error/20 rounded-lg p-4 animate-fade-in">
          <p class="text-sm text-error text-center font-medium">{{ errorMessage }}</p>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            البريد الإلكتروني / Email
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 right-0 pl-3 pr-3 flex items-center pointer-events-none text-slate-400">
              <lucide-icon [img]="Mail" [size]="18"></lucide-icon>
            </div>
            <input id="email" type="email" formControlName="email" autocomplete="email" required
              class="appearance-none block w-full px-3 py-2.5 pr-10 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors"
              [class.border-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          </div>
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="mt-1 text-xs text-error font-medium">البريد الإلكتروني مطلوب أو غير صحيح.</p>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            كلمة المرور / Password
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 right-0 pl-3 pr-3 flex items-center pointer-events-none text-slate-400">
              <lucide-icon [img]="Lock" [size]="18"></lucide-icon>
            </div>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" required
              class="appearance-none block w-full px-3 py-2.5 pr-10 pl-10 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors"
              [class.border-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            
            <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 left-0 pl-3 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none">
              <lucide-icon *ngIf="!showPassword" [img]="Eye" [size]="18"></lucide-icon>
              <lucide-icon *ngIf="showPassword" [img]="EyeOff" [size]="18"></lucide-icon>
            </button>
          </div>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="mt-1 text-xs text-error font-medium">كلمة المرور مطلوبة (على الأقل 6 أحرف).</p>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded dark:bg-slate-900 dark:border-slate-600">
            <label for="remember-me" class="mr-2 ml-2 block text-sm text-slate-900 dark:text-slate-300">
              تذكرني / Remember me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-primary hover:text-primary-light transition-colors">هل نسيت كلمة المرور؟</a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-70 disabled:cursor-not-allowed transition-all duration-200">
            <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span *ngIf="!isLoading">دخول / Sign in</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
