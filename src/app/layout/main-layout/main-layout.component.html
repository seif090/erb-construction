<div class="flex h-screen bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
  <!-- Sidebar -->
  <app-sidebar [isOpen]="isSidebarOpen()" class="flex-shrink-0 z-20"></app-sidebar>

  <!-- Main Content Wrapper -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden relative">
    <!-- Header -->
    <app-header (toggleSidebar)="toggleSidebar()" class="z-10"></app-header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden p-6 bg-slate-50 dark:bg-slate-900">
      <div class="max-w-7xl mx-auto w-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
